# https://docs.netlify.com/configure-builds/file-based-configuration/
[build]
  # Root npm = nodemailer voor Netlify Function; daarna webapp build
  command = "npm ci && cd webapp && npm ci && npm run build"
  publish = "webapp/dist"

[build.environment]
  NODE_VERSION = "20"

[functions]
  directory = "netlify/functions"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
